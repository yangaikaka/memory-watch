name: Fetch Stock Prices

on:
  schedule:
    - cron: '0 * * * *'   # 每小时整点运行
  workflow_dispatch:        # 也可以手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices
        run: |
          python3 - <<'EOF'
          import urllib.request, json, time

          symbols = {
            "hynix":   "000660.KS",
            "samsung": "005930.KS",
            "micron":  "MU"
          }

          result = {"updated": int(time.time()), "prices": {}}

          for key, sym in symbols.items():
            try:
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{sym}?interval=1d&range=1d"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as resp:
                data = json.loads(resp.read())
              m = data["chart"]["result"][0]["meta"]
              price = m["regularMarketPrice"]
              prev  = m.get("previousClose") or m.get("chartPreviousClose") or price
              result["prices"][key] = {
                "price": price,
                "change": round(price - prev, 2),
                "pct": round((price - prev) / prev * 100, 2),
                "symbol": sym
              }
            except Exception as e:
              result["prices"][key] = {"error": str(e)}

          with open("prices.json", "w") as f:
            json.dump(result, f)
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M')"
          git push
